              return '<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--cream-dim);">'+
                '<div style="flex:1;font-size:13px;color:var(--cream);">'+esc(p.name)+'</div>'+
                '<div style="font-size:14px;font-weight:700;color:#B5562B;">'+p.avg.toFixed(1)+'h</div>'+
              '</div>';
            }).join('')+
          '</div>'+

        '</div>'+
      '</div>' : '')+

    // ── CATEGORY BREAKDOWN ────────────────────────────────────────────
    (catArr.length?
      '<div class="rpt-section">'+
        '<div class="rpt-section-title">Training Category Breakdown — Group YTD</div>'+
        (dominantCat&&dominantPct>60?
          '<div style="font-size:12px;color:#BD9A5E;margin-bottom:10px;padding:8px 12px;background:rgba(189,154,94,0.08);border-radius:6px;">'+
            '⚠️ <strong>'+esc(dominantCat.cat)+'</strong> accounts for '+dominantPct+'% of all training hours. Consider broadening the category mix.</div>' : '')+
        catArr.map(function(c){
          var f=maxCat>0?c.hrs/maxCat:0;
          var pct=totalCatHrs>0?Math.round(c.hrs/totalCatHrs*100):0;
          return '<div class="ytd-breakdown-row" style="align-items:center;padding:8px 0;border-bottom:1px solid var(--cream-dim);">'+
            '<div style="font-size:13px;color:var(--cream);overflow:hidden;text-overflow:ellipsis;">'+esc(c.cat)+'</div>'+
            '<div class="bar-track"><div class="bar-fill" style="width:'+(f*100)+'%;background:var(--gold);"></div></div>'+
            '<div style="text-align:right;font-size:13px;font-weight:700;color:var(--gold);">'+Math.round(c.hrs)+'h</div>'+
            '<div class="pct-col" style="text-align:right;font-size:11px;color:var(--mist);">'+pct+'%</div>'+
          '</div>';
        }).join('')+
        '<div class="ytd-breakdown-row" style="padding:8px 0;border-top:1px solid var(--gold);margin-top:4px;">'+
          '<div style="font-size:13px;font-weight:700;color:var(--cream);">Total</div><div></div>'+
          '<div style="text-align:right;font-size:13px;font-weight:700;color:var(--gold-light);">'+Math.round(totalCatHrs)+'h</div>'+
          '<div class="pct-col" style="text-align:right;font-size:11px;color:var(--mist);">100%</div>'+
        '</div>'+
      '</div>' : '')+

    // ── DEPT BREAKDOWN ────────────────────────────────────────────────
    (activeDepts.length?
      '<div class="rpt-section">'+
        '<div class="rpt-section-title">Training Hours by Department — Group YTD</div>'+
        (zeroDepts.length?
          '<div style="font-size:12px;color:var(--mist);margin-bottom:10px;padding:8px 12px;background:var(--cream-dim);border-radius:6px;">'+
            'No hours logged: <strong style="color:var(--cream);">'+zeroDepts.join(', ')+'</strong></div>' : '')+
        '<div class="ytd-dept-row" style="padding:0 0 6px 0;">'+
          '<div></div><div></div><div></div><div class="pct-col"></div>'+
          '<div class="avg-col" style="text-align:right;font-size:10px;letter-spacing:0.05em;text-transform:uppercase;color:var(--mist);">Hrs/Member</div>'+
        '</div>'+
        activeDepts.map(function(d){
          var f=maxDeptHrs>0?d.hrs/maxDeptHrs:0;
          var pct=totalDeptHrs>0?Math.round(d.hrs/totalDeptHrs*100):0;
          var avgTxt=d.avgPerMember!=null?d.avgPerMember.toFixed(1)+'h':'—';
          return '<div class="ytd-dept-row" style="align-items:center;padding:8px 0;border-bottom:1px solid var(--cream-dim);">'+
            '<div style="font-size:13px;color:var(--cream);overflow:hidden;text-overflow:ellipsis;">'+esc(d.dept)+'</div>'+
            '<div class="bar-track"><div class="bar-fill" style="width:'+(f*100)+'%;background:#2F6B4F;"></div></div>'+
            '<div style="text-align:right;font-size:13px;font-weight:700;color:var(--gold);">'+Math.round(d.hrs)+'h</div>'+
            '<div class="pct-col" style="text-align:right;font-size:11px;color:var(--mist);">'+pct+'%</div>'+
            '<div class="avg-col" style="text-align:right;font-size:12px;color:var(--mist);">'+avgTxt+(d.headcount?' <span style="opacity:0.6;">('+d.headcount+')</span>':'')+'</div>'+
          '</div>';
        }).join('')+
        '<div class="ytd-dept-row" style="padding:8px 0;border-top:1px solid var(--gold);margin-top:4px;">'+
          '<div style="font-size:13px;font-weight:700;color:var(--cream);">Total</div><div></div>'+
          '<div style="text-align:right;font-size:13px;font-weight:700;color:var(--gold-light);">'+Math.round(totalDeptHrs)+'h</div>'+
          '<div class="pct-col" style="text-align:right;font-size:11px;color:var(--mist);">100%</div>'+
          '<div class="avg-col" style="text-align:right;font-size:12px;font-weight:700;color:var(--gold-light);">'+(overallAvgPerMember!=null?overallAvgPerMember.toFixed(1)+'h':'—')+'</div>'+
        '</div>'+
      '</div>' : '')+

    '<div class="section-label" style="margin-bottom:16px;">Properties — Click to view monthly breakdown</div>'+

    // ── PROPERTY CARDS ────────────────────────────────────────────────
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:32px;">'+
    props.slice().sort(function(a,b){ return a.country===b.country?a.name.localeCompare(b.name):a.country.localeCompare(b.country); })
    .map(function(p){
      var tot=p.total, ytdH=tot.ytdHrs||0, team=tot.teamMembers||0;
      var avg=team>0?(ytdH/team).toFixed(1):'0';
      var pct=team>0?Math.round(ytdH/(team*50)*100):0;
      var m=mostRecentActiveMonth(p.months);
      var traj=m?(p.country==='Kenya'?m.keTraj:m.tzTraj):'';
      var borderCol=ragColor(traj);

      // Projected year-end
      var monthlyAvg=maxMonthsLogged>0?ytdH/maxMonthsLogged:0;
      var projected=ytdH+monthlyAvg*monthsRemaining;
      var projAvg=team>0?(projected/team).toFixed(1):'0';
      var willHit=team>0&&projected>=(team*50);

      var maxHrs=0;
      p.months.forEach(function(mo){ if(mo.totalHrs>maxHrs) maxHrs=mo.totalHrs; });
      var bars=p.months.map(function(mo){
        var h=maxHrs>0?Math.round((mo.totalHrs/maxHrs)*40):0;
        return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;">'+
          '<div style="width:100%;border-radius:2px 2px 0 0;min-height:2px;height:'+(h||2)+'px;background:'+(mo.totalHrs>0?'var(--gold)':'var(--grey-border)')+';"></div>'+
          '<div style="font-size:7px;color:var(--mist);margin-top:2px;">'+mo.month.charAt(0)+'</div>'+
        '</div>';
      }).join('');

      return '<div style="background:var(--navy-card);border:1px solid var(--line);border-left:4px solid '+borderCol+';border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all 0.2s;" class="ytd-pcard" data-ytdcode="'+esc(p.code)+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;">'+
          '<div style="font-family:Cormorant Garamond,serif;font-size:15px;font-weight:600;color:var(--cream);">'+esc(p.name)+'</div>'+
          '<div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--silver);white-space:nowrap;margin-left:8px;">'+esc(p.country)+'</div>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0;">'+
          '<div><div style="font-size:18px;font-weight:700;color:var(--gold);line-height:1.1;">'+Math.round(ytdH).toLocaleString()+'h</div><div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mist);">YTD Hours</div></div>'+
          '<div><div style="font-size:18px;font-weight:700;color:var(--gold);line-height:1.1;">'+avg+'h</div><div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mist);">Avg/Person</div></div>'+
          '<div><div style="font-size:18px;font-weight:700;color:var(--gold);line-height:1.1;">'+pct+'%</div><div style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--mist);">To Target</div></div>'+
        '</div>'+
        '<div style="display:flex;align-items:flex-end;gap:2px;height:46px;margin-bottom:8px;">'+bars+'</div>'+
        '<div style="display:flex;justify-content:space-between;align-items:center;">'+
          '<div style="font-size:11px;color:var(--mist);">'+ragDot(traj)+ragLabel(traj)+'</div>'+
          (team>0&&monthsRemaining>0?
            '<div style="font-size:10px;color:'+(willHit?'#2F6B4F':'#B5562B')+';">Proj. '+projAvg+'h'+(willHit?' ✓':' ⚠')+'</div>' : '')+
        '</div>'+
      '</div>';
    }).join('')+
    '</div>'+
    '</div>';
  app.innerHTML = html;
  wireTopbar();
  document.querySelectorAll('.ytd-pcard').forEach(function(card){
    card.addEventListener('click', function(){
      var code = this.getAttribute('data-ytdcode');
      var prop = props.find(function(p){ return p.code===code; });
      if(prop) renderYTDProperty(prop);
    });
  });
}

function renderYTDProperty(p){
  STATE.view='ytd_property';
  var tot = p.total;
  var ytdHrs = tot.ytdHrs||0;
  var team   = tot.teamMembers||0;
  var avg    = team>0?(ytdHrs/team).toFixed(1):'0';
  var pct    = team>0?Math.round(ytdHrs/(team*50)*100):0;
  var isKenya = p.country==='Kenya';

  // Latest month with data
  var latestM = mostRecentActiveMonth(p.months);
  var tzTraj  = latestM?latestM.tzTraj:'';
  var keTraj  = latestM?latestM.keTraj:'';

  // Monthly trend bars
  var maxHrs = 0;
  p.months.forEach(function(mo){ if(mo.totalHrs>maxHrs) maxHrs=mo.totalHrs; });
  var trendRows = p.months.map(function(mo){
    var barW = maxHrs>0?Math.round((mo.totalHrs/maxHrs)*100):0;
    var traj = isKenya?mo.keTraj:mo.tzTraj;
    var subOk = (mo.evidenceOk||'').toLowerCase()==='yes';
    var hasSub = mo.subDate&&mo.subDate!=='';
    return '<div style="display:grid;grid-template-columns:46px 1fr 64px 80px;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--cream-dim);">'+
      '<div style="font-size:13px;color:var(--cream);font-weight:500;">'+esc(mo.month)+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+barW+'%;background:'+ragColor(traj)+'"></div></div>'+
      '<div style="text-align:right;font-size:13px;font-weight:700;color:var(--gold);">'+mo.totalHrs.toFixed(1)+'h</div>'+
      '<div style="text-align:right;font-size:11px;">'+
        (hasSub?'<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:'+(subOk?'rgba(47,107,79,0.15)':'rgba(181,86,43,0.12)')+';color:'+(subOk?'#2F6B4F':'#B5562B')+';">'+(subOk?'✓ Done':'⚠ Pending')+'</span>':'<span style="font-size:10px;color:var(--mist);">—</span>')+
      '</div>'+
    '</div>';
  }).join('');

  // Category breakdown
  var totalCatHrs = 0;
  p.categories.forEach(function(c){ totalCatHrs+=c.hrs; });
  var catRows = p.categories.filter(function(c){ return c.hrs>0; }).map(function(c){
    var f = totalCatHrs>0?c.hrs/totalCatHrs:0;
    return '<div style="display:grid;grid-template-columns:1fr 160px 64px;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--cream-dim);">'+
      '<div style="font-size:13px;color:var(--cream);">'+esc(c.cat)+'</div>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+(f*100)+'%;background:var(--gold);"></div></div>'+
      '<div style="text-align:right;font-size:13px;font-weight:700;color:var(--gold);">'+c.hrs.toFixed(1)+'h</div>'+
    '</div>';
  }).join('');

  var html = renderTopbar()+
    '<div class="report-header">'+
      '<button class="back-btn" id="btnBackYTD" style="margin-bottom:12px;">← YTD Training Overview</button>'+
      '<h2 class="rh-title">'+esc(p.name)+'</h2>'+
      '<div class="rh-meta" style="margin-top:4px;">'+esc(p.country)+' · On-Site Training YTD · 50-hour annual target per team member</div>'+
    '</div>'+
    '<div class="section-wrap">'+

    // KPIs
    '<div class="kpi-row kpi-row-4" style="margin-bottom:12px;">'+
      kpiCard(Math.round(ytdHrs).toLocaleString()+' hrs','YTD Hours Logged','gold')+
      kpiCard(avg+' hrs','Avg Hours / Person YTD','forest')+
      kpiCard(pct+'%','Progress to 50hr Target','gold')+
      kpiCard(Math.round(team),'Team Members','forest')+
    '</div>'+

    // RAG status
    '<div class="kpi-row kpi-row-2" style="margin-bottom:24px;">'+
      '<div class="kpi-card kpi-card-forest" style="text-align:center;">'+
        '<div class="kv" style="font-size:16px;">'+ragDot(tzTraj)+ragLabel(tzTraj)+'</div>'+
        '<div class="kl">Tanzania Trajectory</div>'+
      '</div>'+
      '<div class="kpi-card kpi-card-gold" style="text-align:center;">'+
        '<div class="kv" style="font-size:16px;">'+ragDot(keTraj)+ragLabel(keTraj)+'</div>'+
        '<div class="kl">Kenya Trajectory</div>'+
      '</div>'+
    '</div>'+

    // Monthly trend
    '<div class="rpt-section">'+
      '<div class="rpt-section-title">Monthly Training Hours</div>'+
      '<div style="display:grid;grid-template-columns:46px 1fr 64px 80px;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line);">'+
        '<div style="font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--mist);">Month</div>'+
        '<div></div>'+
        '<div style="text-align:right;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--mist);">Hours</div>'+
        '<div style="text-align:right;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--mist);">Submission</div>'+
      '</div>'+
      trendRows+
    '</div>'+

    // Category breakdown
    (catRows?
      '<div class="rpt-section">'+
        '<div class="rpt-section-title">Training Category Breakdown — YTD</div>'+
        catRows+
        '<div style="display:grid;grid-template-columns:1fr 160px 64px;gap:12px;padding:8px 0;border-top:1px solid var(--gold);margin-top:4px;">'+
          '<div style="font-size:13px;font-weight:700;color:var(--cream);">Total</div>'+
          '<div></div>'+
          '<div style="text-align:right;font-size:13px;font-weight:700;color:var(--gold-light);">'+totalCatHrs.toFixed(1)+'h</div>'+
        '</div>'+
      '</div>'
    : '')+

    // Department breakdown
    (function(){
      var deptData = YTD_DEPT_DATA[p.code] || {};
      var deptArr = Object.keys(deptData).map(function(d){ return {dept:d, hrs:deptData[d]}; })
        .filter(function(d){ return d.hrs > 0; })
        .sort(function(a,b){ return b.hrs - a.hrs; });
      if(!deptArr.length) return '';
      var maxDeptHrs = deptArr[0].hrs;
      var deptRows = deptArr.map(function(d){
        var f = maxDeptHrs > 0 ? d.hrs/maxDeptHrs : 0;
        return '<div style="display:grid;grid-template-columns:150px 1fr 64px;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--cream-dim);">'+
          '<div style="font-size:13px;color:var(--cream);">'+esc(d.dept)+'</div>'+
          '<div class="bar-track"><div class="bar-fill" style="width:'+(f*100)+'%;background:#2F6B4F;"></div></div>'+
          '<div style="text-align:right;font-size:13px;font-weight:700;color:var(--gold);">'+d.hrs.toFixed(1)+'h</div>'+
        '</div>';
      }).join('');
      return '<div class="rpt-section">'+
        '<div class="rpt-section-title">Training Hours by Department — YTD</div>'+
        deptRows+
      '</div>';
    })()+

    '</div>';

  app.innerHTML = html;
  wireTopbar();
  document.getElementById('btnBackYTD').addEventListener('click', function(){
    renderYTDHome(YTD_DATA_CACHE);
  });
}

document.addEventListener('DOMContentLoaded', function(){ showHome(); });


showHome();

})();
</script>
</body>
</html>
