<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elewana Collection — Specialised Training Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');
/*
  EC Brand Palette — matches elewanacollection.com
  PANTONE 7562C → #BD9A5E  Gold  (text on banners, accents)
  PANTONE 877C  → #8D9090  Grey  (banners, section headers)
  PANTONE 7527C → #F7F6F3  Cream (page background — sampled from brand PDF)
*/
:root {
  --gold:         #BD9A5E;
  --gold-light:   #D4B580;
  --gold-dim:     rgba(189,154,94,0.10);

  --grey-banner:  #6B6E6E;   /* darker grey for banners & section headers */
  --grey-dark:    #6B6E6E;   /* slightly darker grey for hover states */
  --grey-card:    #E8E8E7;   /* light grey cards */
  --grey-card2:   #F0EFED;   /* lighter grey card variant */
  --grey-border:  #D4D3D2;   /* subtle card borders */
  --grey-line:    rgba(141,144,144,0.25); /* grey line dividers */

  --cream-bg:     #F7F6F3;   /* exact EC cream background */
  --cream-hover:  #EEECE9;   /* slightly darker on hover */

  --text-dark:    #2E2B28;   /* primary body text */
  --text-mid:     #6B6E6E;   /* secondary text = same as grey */
  --text-light:   #F7F6F3;   /* text on dark/grey backgrounds */

  /* Aliases for existing CSS variables so nothing breaks */
  --navy:         #F7F6F3;   /* page bg */
  --navy-mid:     #6B6E6E;   /* banners */
  --navy-card:    #FFFFFF;   /* white cards */
  --navy-light:   #EEECE9;   /* hover */
  --cream:        #2E2B28;   /* primary text */
  --cream-dim:    rgba(46,43,40,0.05);
  --mist:         #6B6E6E;   /* secondary text */
  --line:         rgba(141,144,144,0.30);
  --silver:       #8D9090;
  --stone:        #F7F6F3;   /* alias for text on grey banners */

  --good:         #2F6B4F;
  --mid-col:      #BD9A5E;
  --low:          #B5562B;
  --white:        #ffffff;
  --radius:       8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
  background: var(--navy);
  color: var(--cream);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ===== TOPBAR ===== */
.topbar {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--line);
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 16px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
.brand-logo {
  height: 38px;
  width: auto;
  object-fit: contain;
}
.brand-text .name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.04em;
  line-height: 1.1;
}
.brand-text .sub {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-light);opacity:0.85;
  margin-top: 1px;
}
.topbar-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn {
  padding: 8px 18px;
  border-radius: 6px;
  border: none;
  font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.btn-ghost {
  background: transparent;
  color: var(--text-light);opacity:0.85;
  border: 1px solid rgba(213,204,187,0.35);
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
.btn-gold {
  background: var(--gold);
  color: #1C1A17;
}
.btn-gold:hover { background: var(--gold-light); }
.btn-active {
  background: var(--gold-dim);
  color: var(--gold);
  border: 1px solid var(--gold);
}

/* ===== VIEWS ===== */
.view { display: none; }
.view.active { display: block; }

/* ===== LANDING / PROPERTY SELECTOR ===== */
.hero {
  text-align: center;
  padding: 56px 24px 40px;
  max-width: 680px;
  margin: 0 auto;
}
.hero h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(28px, 5vw, 42px);
  font-weight: 700;
  color: var(--cream);
  line-height: 1.2;
  margin-bottom: 12px;
}
.hero h1 .tr-text { color: #4a4a4a; }
.hero h1 span { color: var(--gold); }
.hero p {
  color: var(--mist);
  font-size: 15px;
  max-width: 480px;
  margin: 0 auto 32px;
}
.hero-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn-lg {
  padding: 14px 28px;
  font-size: 15px;
  border-radius: 8px;
}

/* ===== PROPERTY GRID ===== */
.section-wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 60px;
}
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

.country-block { margin-bottom: 36px; }
.country-label {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--silver);
  margin-bottom: 10px;
  padding-left: 2px;
}

.prop-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.prop-card {
  background: var(--navy-card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 14px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  box-shadow: 0 1px 4px rgba(189,154,94,0.08);
}
.prop-card:hover {
  border-color: var(--gold);
  background: var(--navy-light);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(189,154,94,0.15);
}
.prop-card .prop-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--cream);
  margin-bottom: 6px;
  line-height: 1.3;
}
.prop-card .prop-code {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--silver);
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
}
.prop-card .prop-count {
  position: absolute;
  top: 10px;
  right: 10px;
  background: transparent;
  color: var(--gold);
  font-size: 10px;
  font-weight: 700;
  padding: 0;
  white-space: nowrap;
}
.prop-card .prop-count.zero {
  color: var(--silver);
}

/* ===== REPORT LIST (after selecting a property) ===== */
.back-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 28px;
}
.back-btn {
  background: none;
  border: none;
  color: var(--gold);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0;
  font-family: 'DM Sans', 'Helvetica Neue', sans-serif;
}
.back-btn:hover { color: var(--gold-light); }
.prop-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 24px;
  color: var(--cream);
}

.report-list { display: flex; flex-direction: column; gap: 10px; }
.report-card {
  background: var(--navy-card);
  border: 1px solid var(--line);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.2s;
  gap: 12px;
}
.report-card:hover { border-color: var(--gold); background: var(--navy-light); }
.report-card .rc-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--cream);
}
.report-card .rc-meta {
  font-size: 12px;
  color: var(--mist);
  margin-top: 2px;
}
.report-card .rc-arrow {
  color: var(--gold);
  font-size: 18px;
  flex-shrink: 0;
}
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--mist);
}
.empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.7; }

/* ===== REPORT VIEW ===== */
.report-header {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--line);
  padding: 24px 28px;
  margin-bottom: 28px;
}
.report-header .rh-prop {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-light);opacity:0.85;
  margin-bottom: 4px;
  font-family: 'DM Sans', sans-serif;
}
.report-header .rh-title {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 26px;
  font-weight: 600;
  color: #F0EBE0;
  line-height: 1.2;
}
.report-header .rh-meta {
  font-size: 12px;
  color: var(--text-light);opacity:0.85;
  margin-top: 6px;
}

/* KPI row */
.kpi-row {
  display: grid;
  gap: 10px;
  margin-bottom: 10px;
}
.kpi-row-4 { grid-template-columns: repeat(4, 1fr); }
.kpi-row-2 { grid-template-columns: repeat(2, 1fr); }
.kpi-card {
  background: var(--navy-card);
  border: 1px solid var(--line);
  border-top: 3px solid var(--gold);
  border-radius: var(--radius);
  padding: 18px 14px;
  text-align: center;
  box-shadow: 0 1px 4px rgba(189,154,94,0.08);
}
.kpi-card.forest { border-top-color: #2F6B4F; }
.kpi-card .kv {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 34px;
  font-weight: 600;
  color: var(--gold);
  line-height: 1;
  margin-bottom: 6px;
}
.kpi-card.forest .kv { color: var(--good); }
.kpi-card .kl {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #3D3F3F;
}

/* Tag pills */
.tag-row {
  display: flex;
  gap: 10px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.tag-pill {
  background: var(--navy-card);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 10px 16px;
  flex: 1;
  min-width: 200px;
}
.tag-pill .tl {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 4px;
}
.tag-pill .tv {
  font-size: 14px;
  font-weight: 600;
  color: var(--cream);
}

/* Section blocks */
.rpt-section { margin-bottom: 28px; }
.rpt-section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 14px;
}

/* Score bars */
.score-table { display: flex; flex-direction: column; gap: 0; }
.score-row {
  display: grid;
  grid-template-columns: 1fr 220px 56px;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--cream-dim);
}
.score-row:last-child { border-bottom: none; }
.score-row .sq { font-size: 13px; color: var(--cream); }
.bar-track {
  background: rgba(255,255,255,0.07);
  border-radius: 3px;
  height: 10px;
  overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; }
.score-row .sp {
  text-align: right;
  font-size: 13px;
  font-weight: 700;
}

/* YTD Group breakdown rows — Category (4 col) & Department (5 col) */
.ytd-breakdown-row {
  display: grid;
  grid-template-columns: 200px 1fr 80px 50px;
  gap: 12px;
}
.ytd-dept-row {
  display: grid;
  grid-template-columns: 150px 1fr 80px 50px 90px;
  gap: 12px;
}

.legend-row {
  display: flex;
  gap: 20px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--mist);
  font-weight: 600;
}
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

/* Dept cards */
.dept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.dept-card {
  background: var(--navy-card);
  border: 1px solid var(--line);
  border-top: 3px solid var(--gold);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.dept-card.good { border-top-color: var(--good); }
.dept-card.mid-col { border-top-color: var(--mid-col); }
.dept-card.low-col { border-top-color: var(--low); }
.dept-card .dc-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--cream);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.dept-card .dc-contact {
  font-size: 11px;
  color: var(--mist);
  font-style: italic;
  margin-bottom: 8px;
}
.status-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  margin-bottom: 8px;
}
.status-badge.good { background: rgba(59,140,94,0.2); color: #5FCB8A; }
.status-badge.mid-col { background: rgba(201,162,75,0.2); color: var(--gold); }
.status-badge.low-col { background: rgba(181,86,43,0.2); color: #E07A50; }
.dept-card .dc-notes { font-size: 12px; color: var(--mist); line-height: 1.5; }

/* Topics */
.topic-list { list-style: none; }
.topic-list li {
  padding: 8px 0;
  border-bottom: 1px solid var(--cream-dim);
  font-size: 13px;
  color: var(--cream);
  display: flex;
  align-items: center;
  gap: 10px;
}
.topic-list li::before {
  content: '';
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  flex-shrink: 0;
}
.topic-list li:last-child { border-bottom: none; }

/* Qual feedback */
.qual-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.qual-card {
  background: var(--navy-card);
  border: 1px solid var(--line);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.qual-card .qc-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.qual-card ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.qual-card ul li {
  font-size: 12px;
  color: var(--mist);
  padding-left: 12px;
  position: relative;
  line-height: 1.5;
}
.qual-card ul li::before {
  content: '–';
  position: absolute;
  left: 0;
  color: var(--gold);
}

/* Hours table */
.hours-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.hours-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #3D3F3F;
  border-bottom: 1px solid var(--line);
  font-weight: 600;
}
.hours-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--cream-dim);
  color: #2E2B28;
}
.hours-table tr:last-child td { border-bottom: none; }
.hours-table tr:nth-child(even) td { background: var(--cream-dim); }
.hours-table td.num { text-align: right; font-weight: 700; color: var(--gold); }
.hours-table tr.total-row td {
  border-top: 1px solid var(--gold);
  font-weight: 700;
  color: var(--cream);
  background: var(--navy-card);
}
.hours-table tr.total-row td.num { color: var(--gold-light); }

/* Docs */
.docs-list { display: flex; flex-direction: column; gap: 0; }
.doc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 10px 0;
  border-bottom: 1px solid var(--cream-dim);
}
.doc-row:last-child { border-bottom: none; }
.doc-row .dr-label {
  font-size: 13px;
  color: var(--mist);
  font-weight: 500;
}
.doc-row a {
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  text-decoration: none;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.doc-row a:hover { color: var(--gold-light); text-decoration: underline; }

/* Photo gallery */
.photo-gallery { margin-bottom: 20px; }
.photo-gallery-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
}
.photo-gallery-folder {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  color: var(--gold);
  text-decoration: none;
  background: var(--gold-dim);
  border: 1px solid var(--gold);
  border-radius: 20px;
  padding: 5px 14px;
  margin-bottom: 12px;
  transition: background 0.15s;
}
.photo-gallery-folder:hover { background: rgba(189,154,94,0.20); }
.photo-strip {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.photo-thumb {
  width: 120px;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
  border: 1px solid var(--line);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  background: var(--grey-card);
}
.photo-thumb:hover { transform: scale(1.04); box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
.photo-lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  cursor: zoom-out;
}
.photo-lightbox img {
  max-width: 90vw;
  max-height: 88vh;
  border-radius: 6px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.photo-lightbox-close {
  position: absolute;
  top: 18px;
  right: 24px;
  color: #fff;
  font-size: 28px;
  font-weight: 300;
  cursor: pointer;
  line-height: 1;
  background: none;
  border: none;
  padding: 0;
}

.doc-row .no-link {
  font-size: 12px;
  color: rgba(245,237,216,0.25);
  font-style: italic;
}

/* ===== GROUP OVERVIEW ===== */
.group-banner {
  background: var(--navy-mid);
  border-bottom: 1px solid var(--line);
  padding: 28px;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}
.group-banner h2 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 26px;
  font-weight: 600;
  color: #F7F6F3;
}
.group-banner .gb-meta { font-size: 13px; color: rgba(247,246,243,0.70); }

.bar-chart-row {
  display: grid;
  grid-template-columns: 1fr 200px 64px;
  align-items: center;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid var(--cream-dim);
}
.bar-chart-row:last-child { border-bottom: none; }
.bar-chart-row .bl { font-size: 13px; color: var(--cream); }
.bar-chart-row .bv {
  text-align: right;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
}

/* Group reports table */
.group-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.group-table th {
  text-align: left;
  padding: 8px 12px;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #3D3F3F;
  border-bottom: 1px solid var(--line);
  font-weight: 600;
  white-space: nowrap;
}
.group-table td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--cream-dim);
  color: #2E2B28;
  vertical-align: middle;
}
.group-table tr:last-child td { border-bottom: none; }
.group-table tr:hover td { background: var(--cream-dim); }
.group-table .lnk {
  color: var(--gold);
  font-weight: 700;
  cursor: pointer;
  text-decoration: none;
}
.group-table .lnk:hover { color: var(--gold-light); text-decoration: underline; }

<div id="app"></div>

<script>
(function(){

// ================================================================
// CONFIG — Admin password
// ================================================================
// ================================================================
// PROPERTIES — All 18 properties with codes and countries
// ================================================================
var PROPERTIES = [
  { name:"Arusha Coffee Lodge",        code:"ACL",  country:"Tanzania" },
  { name:"Tarangire Treetops",         code:"TTT",  country:"Tanzania" },
  { name:"The Manor at Ngorongoro",    code:"TMN",  country:"Tanzania" },
  { name:"Serengeti Pioneer Camp",     code:"SPC",  country:"Tanzania" },
  { name:"Serengeti Migration Camp",   code:"SMC",  country:"Tanzania" },
  { name:"Serengeti Explorer",         code:"SXR",  country:"Tanzania" },
  { name:"Ngorongoro Explorer",        code:"NXR",  country:"Tanzania" },
  { name:"Elsa's Kopje Meru",          code:"EKM",  country:"Kenya"    },
  { name:"Kilindi Zanzibar",           code:"KLZ",  country:"Tanzania" },
  { name:"Tortilis Camp Amboseli",     code:"TCA",  country:"Kenya"    },
  { name:"Sand River Masai Mara",      code:"SRM",  country:"Kenya"    },
  { name:"Elephant Pepper Camp",       code:"EPC",  country:"Kenya"    },
  { name:"Little Elephant Pepper Camp",code:"LEPC", country:"Kenya"    },
  { name:"Loisaba Tented Camp",        code:"LTC",  country:"Kenya"    },
  { name:"Loisaba Star Beds",          code:"LSB",  country:"Kenya"    },
  { name:"Loisaba Lodo Springs",       code:"LLS",  country:"Kenya"    },
  { name:"Lewa Safari Camp",           code:"LSC",  country:"Kenya"    },
  { name:"Kifaru House Lewa",          code:"KHL",  country:"Kenya"    },
  { name:"Online Virtual Session",     code:"OVS",  country:"Virtual"  },
];

// ================================================================
// STATE
// ================================================================
var STATE = {
  view: "home",       // home | property | report | group | ytd | ytd_property
  property: null,     // property object
  reportData: null,   // parsed CSV rows
  reportMeta: null,   // { label, url, propName }
};

var CACHE = {};
var app = document.getElementById("app");
var modalEl = document.getElementById("adminModal");

// ================================================================
// PERSISTENCE
// ================================================================
// ================================================================
// REGISTRY — Live Google Sheet (add rows there, dashboard updates for everyone)
// ================================================================
// This is the published CSV link for the "Elewana Training Report Registry" sheet.
// Column A = Property Name, Column B = Report Title, Column C = Published CSV Link
// Add a new row there every time you complete a report — no code changes needed.
var REGISTRY_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQXBeWbYcy3WlJiNsBYqVdsXxQ83FJmlXoIZhEpic7LCddRngx69KJ5d42YXQnVZg_rZTiRBSAA5HM1/pub?gid=0&single=true&output=csv";

// In-memory registry — loaded once from the Google Sheet on startup
var REGISTRY = {}; // { propertyName: [{label, url}, ...] }
var REGISTRY_LOADED = false;
var REGISTRY_CALLBACKS = [];

function loadRegistry(cb){
  if(REGISTRY_LOADED){ cb(); return; }
  REGISTRY_CALLBACKS.push(cb);
  if(REGISTRY_CALLBACKS.length > 1) return; // already fetching
  // Safety timeout: if network unavailable (preview/offline), render home after 4s
  var timedOut = false;
  var timer = setTimeout(function(){
    if(!REGISTRY_LOADED){
      timedOut = true;
      REGISTRY_LOADED = true;
      var cbs2 = REGISTRY_CALLBACKS.slice();
      REGISTRY_CALLBACKS = [];
      cbs2.forEach(function(fn){ fn(); });
    }
  }, 4000);
  fetchCSV(REGISTRY_URL, function(err, rows){
    if(timedOut) return;
    clearTimeout(timer);
    if(err){
      console.warn('Registry load failed:', err);
    } else {
      REGISTRY = {};
      // Auto-detect columns: 2-col = (Property, URL), 3-col = (Property, Title, URL)
      for(var i=0; i<rows.length; i++){
        var r = rows[i];
        var prop = (r[0]||'').trim();
        var label, url;
        if(r.length >= 3){
          label = (r[1]||'').trim();
          url   = (r[2]||'').trim();
        } else {
          label = (r[1]||'').trim();
          url   = label; // only 2 cols — label IS the url
          label = 'Training Report';
        }
        // Skip header row and empty rows
        if(!prop || !url || prop.toLowerCase()==='property') continue;
        if(!REGISTRY[prop]) REGISTRY[prop] = [];
        REGISTRY[prop].push({label: label||'Training Report', url: url});
      }
    }
    REGISTRY_LOADED = true;
    var cbs = REGISTRY_CALLBACKS.slice();
    REGISTRY_CALLBACKS = [];
    cbs.forEach(function(fn){ fn(); });
  });
}

function getReports(propName){
  // Returns reports either directly registered to this property
  // OR that list this property in their propsRepresented field (from cache)
  var direct = REGISTRY[propName] || [];
  var cross = [];
  // Check cached multi-property reports
  Object.keys(MULTI_PROP_CACHE).forEach(function(url){
    var props = MULTI_PROP_CACHE[url];
    if(props.indexOf(propName) > -1){
      // find this report's label from registry
      var found = null;
      Object.keys(REGISTRY).forEach(function(p){
        (REGISTRY[p]||[]).forEach(function(r){
          if(r.url === url) found = r;
        });
      });
      if(found && !direct.some(function(d){return d.url===url;})){
        cross.push({label:found.label+' ✦', url:url, crossProperty:true});
      }
    }
  });
  return direct.concat(cross);
}

function allLoadedReports(){
  var list = [], seen = {};
  PROPERTIES.forEach(function(p){
    (REGISTRY[p.name]||[]).forEach(function(r, i){
      if(!seen[r.url]){
        seen[r.url] = true;
        list.push({ property:p.name, code:p.code, label:r.label, url:r.url, idx:i });
      }
    });
  });
  return list;
}

// Cache of multi-property report URLs -> array of property names they cover
var MULTI_PROP_CACHE = {};
function cacheMultiProps(url, rep){
  if(rep.propsRepresented && rep.propsRepresented.length > 0){
    var all = [rep.property].concat(rep.propsRepresented);
    MULTI_PROP_CACHE[url] = all;
  }
}

// Admin: add/remove still write to a local override layer so L&D can
// manage without touching the Google Sheet directly (optional convenience).
// The registry Google Sheet remains the source of truth for all users.
var STORE_KEY = "elewanaTrainingDash_v3";
function loadLocalOverrides(){
  try{ var r=localStorage.getItem(STORE_KEY); return r?JSON.parse(r):{}; }catch(e){return{};}
}
function saveLocalOverrides(data){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }catch(e){}
}
function addReport(propName, label, url){
  // Add to registry cache immediately so it's visible now
  if(!REGISTRY[propName]) REGISTRY[propName]=[];
  REGISTRY[propName].push({label:label, url:url});
  // Also persist locally so it survives page refresh on this device
  var s=loadLocalOverrides();
  if(!s[propName]) s[propName]=[];
  s[propName].push({label:label, url:url});
  saveLocalOverrides(s);
}
function removeReport(propName, idx){
  if(REGISTRY[propName]) REGISTRY[propName].splice(idx,1);
  var s=loadLocalOverrides();
  if(s[propName]) s[propName].splice(idx,1);
  saveLocalOverrides(s);
}
function mergeLocalOverrides(){
  var s=loadLocalOverrides();
  Object.keys(s).forEach(function(prop){
    if(!REGISTRY[prop]) REGISTRY[prop]=[];
    s[prop].forEach(function(r){
      var exists=REGISTRY[prop].some(function(x){return x.url===r.url;});
      if(!exists) REGISTRY[prop].push(r);
    });
  });
}

// ================================================================
// CSV / FETCH
// ================================================================
function parseCSV(text){
  var rows=[], row=[], field="", inQ=false;
  for(var i=0;i<text.length;i++){
    var ch=text[i];
    if(inQ){ if(ch==='"'){ if(text[i+1]==='"'){field+='"';i++;} else inQ=false; } else field+=ch; }
    else {
      if(ch==='"') inQ=true;
      else if(ch===','){ row.push(field); field=""; }
      else if(ch==='\n'){ row.push(field); rows.push(row); row=[]; field=""; }
      else if(ch!=='\r') field+=ch;
    }
  }
  if(field||row.length){ row.push(field); rows.push(row); }
  return rows;
}

function fetchCSV(url, cb){
  if(CACHE[url]){ cb(null, CACHE[url]); return; }
  var attempts = [
    url,
    "https://api.allorigins.win/raw?url="+encodeURIComponent(url),
    "https://corsproxy.io/?url="+encodeURIComponent(url),
    "https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(url)
  ];
  var tryNext = function(i){
    if(i>=attempts.length){ cb(new Error("Could not load")); return; }
    fetch(attempts[i]).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.text();
    }).then(function(text){
      var data = parseCSV(text);
      CACHE[url] = data;
      cb(null, data);
    }).catch(function(){ tryNext(i+1); });
  };
  tryNext(0);
}

// ================================================================
// DYNAMIC ROW DETECTION
// ================================================================
function detectRows(data){
  var ROW={ property:4,programme:5,monthYear:6,trainer:7,venue:8,reportDate:9,
    propsRepresented:-1,
    participants:-1,trainingDays:-1,deptsCovered:-1,
    sessionHours:-1,trainingCategory:-1,division:-1,overallSat:-1,
    qStart:-1,qEnd:-1,deptStart:-1,deptEnd:-1,
    topicStart:-1,topicEnd:-1,qualStart:-1,qualEnd:-1,
    indivStart:-1,indivEnd:-1,indivTotal:-1,docsStart:-1,docsEnd:-1 };
  var inM=false,inQ=false,inD=false,inT=false,inQl=false,inI=false,inDoc=false;
  for(var i=0;i<data.length;i++){
    var c0=(data[i][0]||"").trim();
    if(c0.indexOf("2. Key Metrics")>-1){inM=true;continue;}
    if(c0.indexOf("3. Evaluation")>-1){inM=false;inQ=true;continue;}
    if(c0.indexOf("4. Departmental")>-1){inQ=false;inD=true;continue;}
    if(c0.indexOf("5. Training Content")>-1){inD=false;inT=true;continue;}
    if(c0.indexOf("6. Qualitative")>-1){inT=false;inQl=true;continue;}
    if(c0.indexOf("7. Individual")>-1){inQl=false;inI=true;continue;}
    if(c0.indexOf("8. Supporting")>-1){inI=false;inDoc=true;continue;}
    if(c0.indexOf("Properties Represented")>-1){ ROW.propsRepresented=i; continue; }
    if(inM){
      if(c0.indexOf("Number of Participants")>-1) ROW.participants=i;
      else if(c0.indexOf("Training Days")>-1) ROW.trainingDays=i;
      else if(c0.indexOf("Departments Covered")>-1) ROW.deptsCovered=i;
      else if(c0.indexOf("Training Hours")>-1) ROW.sessionHours=i;
      else if(c0.indexOf("Training Category")>-1) ROW.trainingCategory=i;
      else if(c0.indexOf("Division")>-1) ROW.division=i;
      else if(c0.indexOf("Overall Satisfaction")>-1) ROW.overallSat=i;
    }
    if(inQ){ if(c0.match(/^Q\d+$/)){ if(ROW.qStart<0)ROW.qStart=i; ROW.qEnd=i; } }
    if(inD){ if(c0==="Department")continue; if(c0.indexOf("Status dropdown")>-1){inD=false;continue;} if(c0){if(ROW.deptStart<0)ROW.deptStart=i;ROW.deptEnd=i;} }
    // Topics: content is in col 0, skip header rows
    if(inT){ if(c0.indexOf("List each")>-1||c0==="Topic / Module Covered")continue; if(c0){if(ROW.topicStart<0)ROW.topicStart=i;ROW.topicEnd=i;} }
    // Quals: title in col 0, summary in col 2 (merged cells collapse)
    if(inQl){ if(c0.indexOf("Summarise")>-1||c0==="Feedback Question")continue; if(c0){if(ROW.qualStart<0)ROW.qualStart=i;ROW.qualEnd=i;} }
    // Individual hours: name col 0, dept col 2, hours col 4 (merged cells collapse to every 2nd col)
    if(inI){ if(c0.indexOf("List each participant")>-1||c0==="Participant Name")continue; if(c0.indexOf("TOTAL HOURS")>-1){ROW.indivTotal=i;inI=false;continue;} if(c0){if(ROW.indivStart<0)ROW.indivStart=i;ROW.indivEnd=i;} }
    // Docs: label col 0, link col 2 (merged cells collapse)
    if(inDoc){ if(c0.indexOf("Paste shareable")>-1)continue; if(c0){if(ROW.docsStart<0)ROW.docsStart=i;ROW.docsEnd=i;} }
  }
  return ROW;
}

function extractReport(rows){
  var ROW=detectRows(rows);
  var g=function(r,c){ return rows[r]&&rows[r][c]!==undefined?rows[r][c]:""; };
  var pv=function(s){ var n=parseFloat(String(s||"").trim()); if(isNaN(n))return 0; return String(s).indexOf("%")>-1?n/100:n; };
  var rep={};
  rep.property=g(ROW.property,1); rep.programme=g(ROW.programme,1);
  rep.monthYear=g(ROW.monthYear,1); rep.reportDate=g(ROW.reportDate,1);
  rep.trainer=g(ROW.trainer,1);
  // Multi-property: parse comma-separated list from "Properties Represented" field
  var propsRaw = ROW.propsRepresented>=0 ? (g(ROW.propsRepresented,1)||'').trim() : '';
  rep.propsRepresented = propsRaw ? propsRaw.split(',').map(function(p){return p.trim();}).filter(function(p){ return p && p.toLowerCase().indexOf('not applicable') === -1; }) : [];
  rep.participants=parseFloat(g(ROW.participants,1))||0;
  rep.trainingDays=parseFloat(g(ROW.trainingDays,1))||0;
  rep.deptsCovered=parseFloat(g(ROW.deptsCovered,1))||0;
  rep.overallSat=pv(g(ROW.overallSat,1));
  rep.sessionHours=parseFloat(g(ROW.sessionHours,1))||0;
  rep.trainingCategory=g(ROW.trainingCategory,1)||"";
  rep.division=g(ROW.division,1)||"";
  rep.questions=[];
  for(var r=ROW.qStart;r<=ROW.qEnd&&r>=0;r++){
    // Q scores: qnum col 0, label col 1, score col 2
    var qn=g(r,0),ql=g(r,1),sc=pv(g(r,2));
    if(qn) rep.questions.push({qnum:qn,label:ql,score:sc});
  }
  rep.depts=[];
  for(var r=ROW.deptStart;r<=ROW.deptEnd&&r>=0;r++){
    // Dept: name col 0, contacts col 1, status col 3, notes col 5
    // CSV collapses merged cols so: name=0, contacts=1, status=3, notes=5
    var dn=g(r,0),dc=g(r,1),ds=g(r,3),dnotes=g(r,5);
    if(dn) rep.depts.push({name:dn,contacts:dc,status:ds,notes:dnotes});
  }
  rep.topics=[];
  for(var r=ROW.topicStart;r<=ROW.topicEnd&&r>=0;r++){
    // Topics: label in col 0, link in col 4 (column E — col A:D merged for label, E:F for link)
    var t=g(r,0), link=(g(r,4)||g(r,2)||'').trim();
    if(t) rep.topics.push({label:t, link:link});
  }
  rep.quals=[];
  for(var r=ROW.qualStart;r<=ROW.qualEnd&&r>=0;r++){
    // Quals: title col 0, summary col 2 (merged label+col cols collapse)
    var qt=g(r,0),qs=g(r,2);
    if(qt){
      // newlines in CSV may be stripped — split on common separators
      var pts=(qs||"").split(/\n/).filter(Boolean);
      rep.quals.push({title:qt,points:pts});
    }
  }
  rep.hours=[];
  for(var r=ROW.indivStart;r<=ROW.indivEnd&&r>=0;r++){
    // Individual hours: name col 0, dept col 2, hours col 4 (merged cells collapse)
    var hn=g(r,0),hd=g(r,2),hh=parseFloat(g(r,4));
    if(hn) rep.hours.push({name:hn,dept:hd,hours:isNaN(hh)?0:hh});
  }
  // Total hours: col 4 (hours column, merged label cols)
  rep.totalIndivHours=parseFloat(g(ROW.indivTotal,4))||
                      parseFloat(g(ROW.indivTotal,2))||
                      parseFloat(g(ROW.indivTotal,1))||0;
  rep.docs=[];
  for(var r=ROW.docsStart;r<=ROW.docsEnd&&r>=0;r++){
    // Docs: label col 0, link col 2 (merged cols collapse)
    var dl=g(r,0),du=(g(r,2)||"").trim();
    if(dl) rep.docs.push({label:dl,link:du});
  }
  return rep;
}

function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function pct(n){ return Math.round(n*100)+"%"; }
function tierColor(s){ return s>=0.97?"#4A8C65":s>=0.92?"#BD9A5E":"#B5562B"; }
function statusCls(s){ var x=(s||"").toLowerCase(); if(x.indexOf("attention")>-1||x.indexOf("risk")>-1)return"low-col"; if(x.indexOf("follow")>-1||x.indexOf("plan")>-1)return"mid-col"; return"good"; }

function wireTopbar(){
  var bh=document.getElementById("btnHome");
  if(bh) bh.addEventListener("click",function(){ showHome(); });
  var bg=document.getElementById("btnGroup");
  if(bg) bg.addEventListener("click",function(){ showGroup(); });
  var by=document.getElementById("btnYTD");
  if(by) by.addEventListener("click",function(){ showYTD(); });
}

// ================================================================
// HOME VIEW
// ================================================================
function showHome(){
  STATE.view="home";
  app.innerHTML = renderTopbar() +
    '<div class="section-wrap" style="padding-top:60px;text-align:center;">'+
    '<div class="spinner" style="margin:0 auto 16px;"></div>'+
    '<p style="color:var(--mist);font-size:14px;">Loading report registry…</p></div>';
  wireTopbar();
  loadRegistry(function(){
    mergeLocalOverrides();
    // Pre-fetch all reports to populate MULTI_PROP_CACHE before rendering home
    var allRpts = allLoadedReports();
    if(allRpts.length === 0){ _renderHome(); return; }
    var pending = allRpts.length;
    allRpts.forEach(function(item){
      fetchCSV(item.url, function(err, rows){
        if(!err && rows){
          var rep = extractReport(rows);
          rep.property = rep.property || item.property;
          cacheMultiProps(item.url, rep);
        }
        pending--;
        if(pending === 0) _renderHome();
      });
    });
  });
}

function _renderHome(){
  var tz = PROPERTIES.filter(function(p){return p.country==="Tanzania";});
  var ke = PROPERTIES.filter(function(p){return p.country==="Kenya";});
  var vt = PROPERTIES.filter(function(p){return p.country==="Virtual";});

  // Count multi-property reports
  var multiReports = [];
  Object.keys(MULTI_PROP_CACHE).forEach(function(url){
    var allProps = MULTI_PROP_CACHE[url];
    // find label
    var label = '';
    Object.keys(REGISTRY).forEach(function(p){
      (REGISTRY[p]||[]).forEach(function(r){if(r.url===url) label=r.label;});
    });
    multiReports.push({url:url, label:label, props:allProps});
  });

  var propCards = function(arr){
    return arr.map(function(p){
      var rpts = getReports(p.name);
      var direct = (REGISTRY[p.name]||[]).length;
      var cross = rpts.length - direct;
      var n = rpts.length;
      return '<div class="prop-card" data-prop="'+esc(p.name)+'">'+
        '<div class="prop-code">'+esc(p.code)+'</div>'+
        '<div class="prop-name">'+esc(p.name)+'</div>'+
        '<div class="prop-count '+(n===0?"zero":"")+'">'+
          (n===0 ? "No reports" :
           direct+(direct===1?" report":" reports")+(cross>0?" + "+cross+" shared":"")+
          "")+
        '</div>'+
      '</div>';
    }).join("");
  };

  var multiSection = multiReports.length ?
    '<div class="section-label" style="margin-top:32px;">Multi-Property Sessions</div>'+
    '<div class="report-list" style="margin-bottom:32px;">'+
      multiReports.map(function(item){
        return '<div class="report-card" data-url="'+esc(item.url)+'" data-multi="1">'+
          '<div>'+
            '<div class="rc-label">✦ '+esc(item.label)+'</div>'+
            '<div class="rc-meta">'+item.props.map(esc).join(' · ')+'</div>'+
          '</div>'+
          '<span class="rc-arrow">›</span>'+
        '</div>';
      }).join("")+
    '</div>' : '';

  var html = renderTopbar()+
    '<div class="section-wrap" style="padding-top:40px;">'+
      '<div class="hero">'+
        '<h1><span class="tr-text">Training Report</span> <span>Dashboard</span></h1>'+
        '<p>Select a property to view its specialised training reports, or open the Specialised Training Group Overview for a cross-property summary.</p>'+
      '</div>'+
      multiSection+
      '<div class="section-label">Tanzania Properties</div>'+
      '<div class="prop-grid" style="margin-bottom:32px;">'+propCards(tz)+'</div>'+
      '<div class="section-label">Kenya Properties</div>'+
      '<div class="prop-grid" style="margin-bottom:32px;">'+propCards(ke)+'</div>'+
      '<div class="section-label">Online / Virtual Training Sessions</div>'+
      '<div class="prop-grid">'+propCards(vt)+'</div>'+
    '</div>';

  app.innerHTML = html;
  wireTopbar();
  document.querySelectorAll(".prop-card").forEach(function(el){
    el.addEventListener("click", function(){
      var prop = PROPERTIES.find(function(p){return p.name===el.getAttribute("data-prop");});
      if(prop) showPropertyReports(prop);
    });
  });
  // Wire multi-property report cards
  document.querySelectorAll(".report-card[data-multi]").forEach(function(el){
    el.addEventListener("click",function(){
      var url = el.getAttribute("data-url");
      var label = el.querySelector(".rc-label").textContent.replace("✦ ","");
      loadAndShowReport(url,{label:label, url:url, propName:"Multi-Property Session"});
    });
  });
}

// ================================================================
// PROPERTY REPORT LIST
// ================================================================
function showPropertyReports(prop){
  STATE.view="property";
  STATE.property=prop;
  loadRegistry(function(){
    mergeLocalOverrides();
    _renderPropertyReports(prop);
  });
}
function _renderPropertyReports(prop){
  var reports = getReports(prop.name);
  var listHtml;
  if(reports.length===0){
    listHtml='<div class="empty-state">'+
      '<div class="empty-icon">📋</div>'+
      '<p>No training reports have been loaded for <strong>'+esc(prop.name)+'</strong> yet.<br>'+
      'An L&amp;D administrator can add reports via the Admin panel.</p>'+
    '</div>';
  } else {
    listHtml='<div class="report-list">'+
      reports.map(function(r,i){

function loadAndShowReport(url, meta){
  STATE.view="report";
  STATE.reportMeta=meta;

  // Show loading
  app.innerHTML=renderTopbar()+
    '<div class="section-wrap" style="padding-top:32px;">'+
      '<div class="back-row">'+
        '<button class="back-btn" id="btnBack2">← '+esc(meta.propName)+'</button>'+
      '</div>'+
      '<div class="loading-state"><div class="spinner"></div><p>Loading report…</p></div>'+
    '</div>';
  wireTopbar();
  document.getElementById("btnBack2").addEventListener("click",function(){
    var prop=PROPERTIES.find(function(p){return p.name===meta.propName;});
    if(prop) showPropertyReports(prop);
  });

  fetchCSV(url, function(err, rows){
    if(err){
      app.innerHTML=renderTopbar()+
        '<div class="section-wrap" style="padding-top:32px;">'+
          '<div class="back-row"><button class="back-btn" id="btnBack3">← '+esc(meta.propName)+'</button></div>'+
          '<div class="err-box">Could not load this report. Please check the link is published and try again.</div>'+
        '</div>';
      wireTopbar();
      document.getElementById("btnBack3").addEventListener("click",function(){
        var prop=PROPERTIES.find(function(p){return p.name===meta.propName;});
        if(prop) showPropertyReports(prop);
      });
      return;
    }
    renderReport(rows, meta);
  });
}

function renderReport(rows, meta){
  var rep=extractReport(rows);
  // Cache multi-property info so other properties can find this report
  cacheMultiProps(meta.url, rep);
  var qSorted=rep.questions.slice().sort(function(a,b){return b.score-a.score;});
  var hi=qSorted[0], lo=qSorted[qSorted.length-1];
  var isMulti = rep.propsRepresented && rep.propsRepresented.length > 0;

  var html=renderTopbar()+
    '<div class="report-header">'+
      '<div class="rh-prop">'+esc(rep.property||meta.propName)+'</div>'+
      '<div class="rh-title">'+esc(rep.programme||meta.label)+'</div>'+
      '<div class="rh-meta">'+esc(rep.monthYear)+(rep.reportDate?' &nbsp;·&nbsp; Report date: '+esc(rep.reportDate):'')+(rep.trainer?' &nbsp;·&nbsp; '+esc(rep.trainer):'')+'</div>'+
    '</div>'+
    '<div class="section-wrap">'+
      '<button class="back-btn" id="btnBackRpt" style="margin-bottom:24px;">← '+esc(meta.propName)+' Reports</button>'+

      // Multi-property badge
      (isMulti ?
        '<div class="multi-badge">✦ Multi-Property Session</div>'+
        '<div class="multi-props">'+
          '<div class="prop-chip host">⌂ '+esc(rep.property||meta.propName)+' (host)</div>'+
          rep.propsRepresented.map(function(p){
            return '<div class="prop-chip">'+esc(p)+'</div>';
          }).join('')+
        '</div>' : '')+

      // KPIs row 1
      '<div class="kpi-row kpi-row-4" style="margin-bottom:10px;">'+
        kpiCard(pct(rep.overallSat),"Overall Satisfaction","gold")+
        kpiCard(rep.participants,"Participants","forest")+
        kpiCard(rep.trainingDays+" days","Training Days","forest")+
        kpiCard(rep.deptsCovered,"Departments","gold")+
      '</div>'+
      // KPIs row 2
      '<div class="kpi-row kpi-row-2" style="margin-bottom:16px;">'+
        kpiCard(rep.sessionHours.toFixed(1)+" hrs","Session Hours","forest")+
        kpiCard(rep.totalIndivHours.toFixed(1)+" hrs","Total Individual Hours Logged","gold")+
      '</div>'+

      // Tags
      (rep.trainingCategory||rep.division ?
        '<div class="tag-row">'+
          (rep.trainingCategory?'<div class="tag-pill"><div class="tl">Training Category</div><div class="tv">'+esc(rep.trainingCategory)+'</div></div>':'')+
          (rep.division?'<div class="tag-pill"><div class="tl">Division</div><div class="tv">'+esc(rep.division)+'</div></div>':'')+
        '</div>' : '')+

      // Satisfaction — 4 grouped pie charts matching Excel style
      (function(){
        var groups=[
          {title:'Session Quality & Materials', qs:['Q1','Q2','Q3','Q8','Q11']},
          {title:'Trainer Performance',         qs:['Q4','Q5','Q6','Q7']},
          {title:'Training Logistics',          qs:['Q9','Q10']},
          {title:'Learning Outcomes',           qs:['Q12','Q13']}
        ];
        var qMap={};
        rep.questions.forEach(function(q){qMap[q.qnum]=q;});
        var palette=['#3D6B52','#BD9A5E','#B8B8B0','#8D8D85','#4A4A42'];

        function drawPieGroup(grp){
          var qs=grp.qs.map(function(n){return qMap[n];}).filter(Boolean);
          if(!qs.length) return '';
          var avg=qs.reduce(function(s,q){return s+q.score;},0)/qs.length;
          var avgCol=tierColor(avg);
          var total=qs.reduce(function(s,q){return s+q.score;},0)||1;
          var cx=90,cy=90,r=82;
          var slices=''; var angle=-Math.PI/2;
          qs.forEach(function(q,i){
            var sweep=(q.score/total)*2*Math.PI;
            var x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
            angle+=sweep;
            var x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
            var large=sweep>Math.PI?1:0;
            var col=palette[i%palette.length];
            slices+='<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+large+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+col+'" stroke="#fff" stroke-width="1.5"/>';
            // % label inside slice
            var midA=angle-sweep/2;
            var lx=cx+(r*0.62)*Math.cos(midA), ly=cy+(r*0.62)*Math.sin(midA);
            if(sweep>0.25) slices+='<text x="'+lx.toFixed(1)+'" y="'+(ly+4).toFixed(1)+'" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" font-family="DM Sans,sans-serif">'+Math.round(q.score*100)+'%</text>';
          });
          var legendHtml=qs.map(function(q,i){
            return '<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:4px;">'+
              '<div style="width:11px;height:11px;border-radius:2px;background:'+palette[i%palette.length]+';flex-shrink:0;margin-top:1px;"></div>'+
              '<span style="font-size:10px;color:#2E2B28;line-height:1.35;">'+esc(q.qnum)+' — '+esc(q.label)+'</span>'+
            '</div>';
          }).join('');
          return '<div style="padding:14px 12px 12px;background:#fff;border:1px solid rgba(141,144,144,0.3);border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.05);">'+
            '<div style="font-family:Cormorant Garamond,Georgia,serif;font-size:13px;font-weight:700;color:#BD9A5E;text-align:center;margin-bottom:2px;line-height:1.3;">'+esc(grp.title)+'</div>'+
            '<div style="font-size:11px;color:'+avgCol+';text-align:center;margin-bottom:10px;font-family:DM Sans,sans-serif;">'+pct(avg)+' avg</div>'+
            '<svg viewBox="0 0 180 180" width="160" height="160" style="display:block;margin:0 auto 10px;">'+slices+'</svg>'+
            '<div style="margin-top:4px;">'+legendHtml+'</div>'+
          '</div>';
        }
        var piesHtml=groups.map(drawPieGroup).join('');

          '<div class="rpt-section-title">Satisfaction by Question Group</div>'+
          '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:8px;">'+piesHtml+'</div>'+
          (hi&&lo?'<div class="insight-box" style="margin-top:12px;">Highest-rated: <strong>'+esc(hi.label)+'</strong> ('+pct(hi.score)+'). Area to watch: <strong>'+esc(lo.label)+'</strong> ('+pct(lo.score)+').</div>':'')+

          '<div class="rpt-section-title">Departmental Status</div>'+
          '<div class="dept-grid">'+
            rep.depts.map(function(d){
              var cls=statusCls(d.status);
              return '<div class="dept-card '+cls+'">'+
                '<div class="dc-name">'+esc(d.name)+'</div>'+
                '<div class="dc-contact">'+esc(d.contacts||"—")+'</div>'+
                '<div class="status-badge '+cls+'">'+esc(d.status)+'</div>'+
                '<div class="dc-notes">'+esc(d.notes)+'</div>'+

          '</div>'+
        '</div>' : "")+

      // Topics

            var link = t.link || '';

              ? '<a href="'+esc(link)+'" target="_blank" rel="noopener" style="color:var(--gold);text-decoration:none;font-weight:600;">'+esc(label)+' <span style="font-size:11px;">↗</span></a>'
              : esc(label))+'</li>';
          }).join('')+'</ul>'+
        '</div>' : "")+

      // Qualitative feedback
      (rep.quals.length?
        '<div class="rpt-section">'+
          '<div class="rpt-section-title">Qualitative Feedback Summary</div>'+
          '<div class="qual-grid">'+
            rep.quals.map(function(q){
              return '<div class="qual-card">'+
                '<div class="qc-title">'+esc(q.title)+'</div>'+
                '<ul>'+q.points.map(function(p){return'<li>'+esc(p)+'</li>';}).join("")+'</ul>'+
              '</div>';
            }).join("")+
          '</div>'+
        '</div>' : "")+

      // Individual hours
      (rep.hours.length?
        '<div class="rpt-section">'+
          '<div class="rpt-section-title">Individual Training Hours</div>'+
          '<table class="hours-table">'+
            '<thead><tr><th>Participant</th><th>Department</th><th class="num">Hours</th></tr></thead>'+
            '<tbody>'+
              rep.hours.map(function(h){
                return '<tr><td>'+esc(h.name)+'</td><td>'+esc(h.dept)+'</td><td class="num">'+h.hours.toFixed(1)+'</td></tr>';
              }).join("")+
              '<tr class="total-row"><td colspan="2"><strong>Total Hours Logged</strong></td><td class="num">'+rep.totalIndivHours.toFixed(1)+'</td></tr>'+
            '</tbody>'+
          '</table>'+
        '</div>' : "")+

      // Supporting documents — with photo gallery
      (function(){
        function driveFileId(url){
          var m=url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
          return m?m[1]:null;
        }
        function driveThumbnail(fileId,size){
          return 'https://lh3.googleusercontent.com/d/'+fileId+'=w'+(size||300);
        }
        var photoDocs=rep.docs.filter(function(d){return d.label.toLowerCase().indexOf('photo')>-1;});
        var otherDocs=rep.docs.filter(function(d){return d.label.toLowerCase().indexOf('photo')===-1;});
        var folderDoc=photoDocs.find(function(d){return d.link&&d.link.indexOf('/folders/')>-1;})||null;
        var photoFiles=photoDocs.filter(function(d){return d.link&&d.link.indexOf('/file/')>-1;});
        var thumbsHtml='';
        if(photoFiles.length){
          thumbsHtml='<div class="photo-strip">'+
            photoFiles.map(function(d){
              var fid=driveFileId(d.link);
              if(!fid)return '';
              return '<img class="photo-thumb" src="'+esc(driveThumbnail(fid,400))+'" '+
                     'data-full="'+esc(driveThumbnail(fid,1600))+'" '+
                     'alt="'+esc(d.label)+'" onerror="this.style.display=\'none\'">';
            }).join('')+
          '</div>';
        }
        var galleryHtml=photoDocs.length?
          '<div class="photo-gallery">'+
            '<div class="photo-gallery-title">📷 Session Photos</div>'+
            (folderDoc?'<a class="photo-gallery-folder" href="'+esc(folderDoc.link)+'" target="_blank" rel="noopener">🗂 Open Photos Folder ↗</a>':'')+
            thumbsHtml+
          '</div>':'';
        var docsHtml='<div class="docs-list">'+
          (otherDocs.length?
            otherDocs.map(function(d){
              return '<div class="doc-row">'+
                '<div class="dr-label">'+esc(d.label)+'</div>'+
                (d.link?'<a href="'+esc(d.link)+'" target="_blank" rel="noopener">Open ↗</a>':
                        '<span class="no-link">Not uploaded yet</span>')+
              '</div>';
            }).join(''):
            '<div class="doc-row"><span class="no-link">No documents linked in this report.</span></div>')+
          '</div>';
        return '<div class="rpt-section">'+
          '<div class="rpt-section-title">Supporting Documents &amp; Records</div>'+
          galleryHtml+docsHtml+
        '</div>';
      }())+

    '</div>'; // section-wrap

  app.innerHTML=html;
  wireTopbar();
  document.getElementById("btnBackRpt").addEventListener("click",function(){
    var prop=PROPERTIES.find(function(p){return p.name===meta.propName;});
    if(prop) showPropertyReports(prop);
  });
  // Wire photo thumbnails → lightbox
  document.querySelectorAll(".photo-thumb").forEach(function(img){
    img.addEventListener("click",function(){
      var lb=document.createElement("div");
      lb.className="photo-lightbox";
      lb.innerHTML='<button class="photo-lightbox-close" title="Close">✕</button>'+
                   '<img src="'+img.getAttribute("data-full")+'" alt="'+img.alt+'">';
      lb.addEventListener("click",function(){ document.body.removeChild(lb); });
      document.body.appendChild(lb);
    });
  });
}

function _doShowGroup(){
  var allRpts=allLoadedReports();

  if(allRpts.length===0){
    app.innerHTML=renderTopbar()+
      '<div class="section-wrap" style="padding-top:40px;">'+
        '<div class="group-banner"><div>'+
          '<button class="back-btn" id="btnBackGroup0">← All Properties</button>'+
          '<h2 style="margin-top:8px;">Specialised Training Group Overview</h2>'+
          '<div class="gb-meta">No reports loaded yet.</div>'+
        '</div></div>'+
        '<div class="empty-state"><div class="empty-icon">📊</div><p>No reports have been added yet. Use the Admin panel to add published report links.</p></div>'+
      '</div>';
    wireTopbar();
    var b0=document.getElementById("btnBackGroup0");
    if(b0) b0.addEventListener("click", showHome);
    return;
  }

  // Show loading then fetch all
  app.innerHTML=renderTopbar()+
    '<div class="section-wrap" style="padding-top:40px;">'+
      '<div class="loading-state"><div class="spinner"></div><p>Loading '+allRpts.length+' reports…</p></div>'+
    '</div>';
  wireTopbar();

  var loaded=[], pending=allRpts.length;
  allRpts.forEach(function(item){
    fetchCSV(item.url, function(err, rows){
      if(!err) loaded.push({meta:item, rep:extractReport(rows)});
      pending--;
      if(pending===0) renderGroup(loaded, allRpts);
    });
  });
}

function renderGroup(loaded, allRpts){
  var totalSat=0, totalPax=0, totalSessionHrs=0, totalIndivHrs=0;
  var qTotals={}, deptCounts={good:0,mid:0,low:0};
  var catHrs={}, divHrs={};
  var propsCovered={};

  var satCount=0;
  loaded.forEach(function(item){
    var rep=item.rep;
    propsCovered[rep.property||item.meta.property]=true;
    if(rep.overallSat>0){ totalSat+=rep.overallSat; satCount++; }
    totalPax+=(rep.participants||0);
    totalSessionHrs+=(rep.sessionHours||0);
    totalIndivHrs+=(rep.totalIndivHours||0);
    if(rep.trainingCategory) catHrs[rep.trainingCategory]=(catHrs[rep.trainingCategory]||0)+(rep.totalIndivHours||0);
    if(rep.division) divHrs[rep.division]=(divHrs[rep.division]||0)+(rep.totalIndivHours||0);

// Parse the consolidated Group Overview CSV
// Structure per property block:
//   Row header: col0=Property, col1=Month ... col17=Category, col18=Hrs
//   Data rows:  col0=CODE, col1=date/month, col3=monthHrs, col8=ytdHrs, col11=tzTraj, col14=keTraj
//               col17=CategoryName, col18=CategoryHrs (only on first 6 data rows)
//   TOTAL row:  col0='', col1='TOTAL', col3=ytdHrs, col2=team
// Department headcount (Group Overview sheet, dept block rows 287–304):
// Column B = department name, Column W = headcount.
// Populated dynamically by parseDeptHeadcountBlock() each time the CSV loads.
var YTD_DEPT_HEADCOUNT = {};

function parseDeptHeadcountBlock(rows){
  var out = {};
  for(var i=286; i<=303 && i<rows.length; i++){
    var r = rows[i];
    if(!r) continue;
    var dname = (r[1]||'').toString().trim();
    if(!dname) continue;
    if(dname.toLowerCase()==='total') continue;
    var hc = parseFloat((r[22]||'').toString().replace(/,/g,''))||0;
    out[dname] = hc;
  }
  return out;
}

// Case/whitespace-insensitive lookup, since the CSV department label and the
// JS dept keys (YTD_DEPT_DATA) may not match byte-for-byte.
function lookupDeptHeadcount(deptName){
  if(YTD_DEPT_HEADCOUNT[deptName]!=null) return YTD_DEPT_HEADCOUNT[deptName];
  var target=(deptName||'').toLowerCase().replace(/\s+/g,' ').trim();
  var keys=Object.keys(YTD_DEPT_HEADCOUNT);
  for(var i=0;i<keys.length;i++){
    if(keys[i].toLowerCase().replace(/\s+/g,' ').trim()===target) return YTD_DEPT_HEADCOUNT[keys[i]];
  }
  return 0;
}

function parseGroupOverviewCSV(rows){
  var props = {};
  var currentCode = null;
  var VALID = YTD_CODE_MAP;

  rows.forEach(function(r){
    var c0 = (r[0]||'').toString().trim();
    var c1 = (r[1]||'').toString().trim();
    var c17 = (r[17]||'').toString().trim();
    var c18 = (r[18]||'').toString().trim();

    // Skip header rows
    if(c0==='Property' && c1==='Month') return;
    if(!c0 && !c1) return;

    // Detect property code
    if(VALID[c0] && c1!=='TOTAL'){
      currentCode = c0;
      if(!props[c0]){
        props[c0] = {
          code: c0,
          name: VALID[c0].name,
          country: VALID[c0].country,
          months: [],
          categories: [],
          total: {}
        };
      }
    }

    if(!currentCode) return;

    // TOTAL row (col0 empty, col1='TOTAL')
    if(c1==='TOTAL' && !VALID[c0]){
      // Only take the first TOTAL for each property
      if(!props[currentCode].total.ytdHrs){
        props[currentCode].total = {
          teamMembers: parseFloat(r[2])||0,
          ytdHrs:      parseFloat(r[3])||0,
          avgHrs:      parseFloat(r[4])||0,
          pctTo50:     parseFloat(r[5])||0
        };
      }
      return;
    }

    // Data row for current property
    if(VALID[c0] && c1 && c1!=='TOTAL'){
      // Parse month name from date string or text
      var monthLabel = c1;
      if(c1.match(/^\d{4}-\d{2}/)){
        var mIdx = parseInt(c1.substring(5,7),10)-1;
        monthLabel = MONTH_NAMES[mIdx]||c1;
      } else if(c1.match(/^\d+(\.\d+)?$/)){
        // Excel serial date
        var d = new Date(Math.round((parseFloat(c1)-25569)*86400*1000));
        monthLabel = MONTH_NAMES[d.getUTCMonth()]||c1;
      } else {
        // "January 2026" → "Jan"
        var parts = c1.split(' ');
        monthLabel = parts[0]?parts[0].substring(0,3):c1;
      }

      props[currentCode].months.push({
        month:       monthLabel,
        teamMembers: parseFloat(r[2])||0,
        totalHrs:    parseFloat(r[3])||0,
        avgHrs:      parseFloat(r[4])||0,
        pctTo50:     parseFloat(r[5])||0,
        subDate:     (r[6]||'').toString().trim(),
        evidenceOk:  (r[7]||'').toString().trim(),
        ytdHrs:      parseFloat(r[8])||0,
        tzTraj:      (r[11]||'').toString().trim(),
        keTraj:      (r[14]||'').toString().trim()
      });

      // Category inline on same row (cols 17+18)
      if(c17 && c17!=='Category' && c17!=='YTD'){
        var catName = CAT_SHORT[c17]||c17;
        var catHrs  = parseFloat(c18)||0;
        if(catHrs>0) props[currentCode].categories.push({cat:catName, hrs:catHrs});
      }
    }
  });

  return Object.values(props);
}

function mostRecentActiveMonth(months){
  for(var i=months.length-1;i>=0;i--){
    if(months[i].totalHrs>0) return months[i];
  }
  return months[0]||null;
}

function showYTD(){
  STATE.view='ytd';
  app.innerHTML = renderTopbar()+
    '<div class="section-wrap" style="padding-top:60px;text-align:center;">'+
    '<div class="spinner" style="margin:0 auto 16px;"></div>'+
    '<p style="color:var(--mist);font-size:14px;">Loading YTD tracker data…</p></div>';
  wireTopbar();

  if(!YTD_CSV_URL){ renderYTDNoCsv(); return; }
  if(YTD_DATA_CACHE){ renderYTDHome(YTD_DATA_CACHE); return; }

  fetchCSV(YTD_CSV_URL, function(err, rows){
    if(err||!rows||rows.length===0){
      renderYTDError('All connection routes failed. Click "Run Diagnostic" to see which routes are available from your browser.');
      return;
    }
    YTD_DATA_CACHE = parseGroupOverviewCSV(rows);
    YTD_DEPT_HEADCOUNT = parseDeptHeadcountBlock(rows);
    if(!YTD_DATA_CACHE||YTD_DATA_CACHE.length===0){
      renderYTDError('CSV loaded but no property data found. Check column A in your sheet contains property codes (ACL, TTT, KLZ etc.).');
      return;
    }
    renderYTDHome(YTD_DATA_CACHE);
  });
}

function renderYTDHome(props){
  STATE.view='ytd';

  // ── Group aggregates ──────────────────────────────────────────────────
  var totalTeam=0, totalYTDHrs=0;
  var keHrs=0, keTeam=0, keGreen=0, keAmber=0, keRed=0;
  var tzHrs=0, tzTeam=0, tzGreen=0, tzAmber=0, tzRed=0;
  var monthTotals={};
  var zeroProps=[], cantReachProps=[];
  var topSubmitted=0, totalMonthsExpected=0;

  // Determine months elapsed (longest month array with data)
  var maxMonthsLogged=0;
  props.forEach(function(p){ if(p.months.length>maxMonthsLogged) maxMonthsLogged=p.months.length; });
  var monthsRemaining = Math.max(0, 12 - maxMonthsLogged);

  props.forEach(function(p){
    var tot    = p.total;
    var ytdH   = tot.ytdHrs||0;
    var team   = tot.teamMembers||0;
    totalTeam   += team;
    totalYTDHrs += ytdH;

    // KE vs TZ split
    var isKE = p.country==='Kenya';
    var isTZ = p.country==='Tanzania';
    var m = mostRecentActiveMonth(p.months);
    var traj = m ? (isKE ? m.keTraj : m.tzTraj) : '';

    if(isKE){ keHrs+=ytdH; keTeam+=team; }
    if(isTZ){ tzHrs+=ytdH; tzTeam+=team; }

    var onTrack   = traj.indexOf('On Track')>-1;
    var needsAtt  = traj.indexOf('Needs Attention')>-1;
    if(isKE){ if(onTrack) keGreen++; else if(needsAtt) keAmber++; else if(traj) keRed++; }
    if(isTZ){ if(onTrack) tzGreen++; else if(needsAtt) tzAmber++; else if(traj) tzRed++; }

    // Zero activity
    if(ytdH===0 && p.country!=='Virtual') zeroProps.push(p.name);

    // Cannot reach target
    if(ytdH>0 && team>0 && monthsRemaining>0){
      var monthlyAvg = ytdH / Math.max(1, maxMonthsLogged);
      var projected  = ytdH + monthlyAvg * monthsRemaining;
      var needed     = team * 50;
      if(projected < needed * 0.85){
        cantReachProps.push({name:p.name, projected:Math.round(projected/team*10)/10, target:50});
      }
    }

    // Group monthly trend
    p.months.forEach(function(mo){
      var k = mo.month;
      monthTotals[k] = (monthTotals[k]||0) + (mo.totalHrs||0);
    });

    // Submission compliance — count most recent month evidenceOk
    if(m && p.country!=='Virtual'){
      totalMonthsExpected++;
      if(m.evidenceOk && m.evidenceOk.toUpperCase()==='Y') topSubmitted++;
    }
  });

  var avgPerPerson = totalTeam>0?(totalYTDHrs/totalTeam).toFixed(1):'0';
  var pctTarget    = totalTeam>0?Math.round(totalYTDHrs/(totalTeam*50)*100):0;
  var keAvg        = keTeam>0?(keHrs/keTeam).toFixed(1):'0';
  var tzAvg        = tzTeam>0?(tzHrs/tzTeam).toFixed(1):'0';
  var kePct        = keTeam>0?Math.round(keHrs/(keTeam*50)*100):0;
  var tzPct        = tzTeam>0?Math.round(tzHrs/(tzTeam*50)*100):0;
  var compliancePct= totalMonthsExpected>0?Math.round(topSubmitted/totalMonthsExpected*100):0;

  // Monthly trend data
  var monthOrder=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var trendArr=monthOrder.filter(function(m){ return monthTotals[m]!=null; })
    .map(function(m){ return {month:m, hrs:monthTotals[m]}; });
  var maxTrendHrs=0;
  trendArr.forEach(function(t){ if(t.hrs>maxTrendHrs) maxTrendHrs=t.hrs; });
  var bestMonth=trendArr.reduce(function(a,b){ return b.hrs>a.hrs?b:a; },{month:'',hrs:0});
  var lastMonth=trendArr[trendArr.length-1]||{month:'',hrs:0};
  var prevMonth=trendArr[trendArr.length-2]||null;

  // Top/bottom 3 properties by avg hrs/person
  var propRanking = props.filter(function(p){ return p.country!=='Virtual' && (p.total.teamMembers||0)>0; })
    .map(function(p){
      var avg=(p.total.ytdHrs||0)/(p.total.teamMembers||1);
      return {name:p.name, code:p.code, avg:avg, ytd:p.total.ytdHrs||0};
    }).sort(function(a,b){ return b.avg-a.avg; });
  var top3=propRanking.slice(0,3);
  var bot3=propRanking.slice(-3).reverse();

  // Dept group totals
  var deptTotals={};
  props.forEach(function(p){
    var dd=YTD_DEPT_DATA[p.code]||{};
    Object.keys(dd).forEach(function(d){ deptTotals[d]=(deptTotals[d]||0)+dd[d]; });
  });
  var deptArr=Object.keys(deptTotals).map(function(d){
      var hc=lookupDeptHeadcount(d);
      return {dept:d, hrs:deptTotals[d], headcount:hc, avgPerMember: hc>0?deptTotals[d]/hc:null};
    })
    .sort(function(a,b){ return b.hrs-a.hrs; });
  var zeroDepts=deptArr.filter(function(d){ return d.hrs===0; }).map(function(d){ return d.dept; });
  var activeDepts=deptArr.filter(function(d){ return d.hrs>0; });

  var overallAvgPerMember=totalDeptHeadcount>0?totalDeptHrs/totalDeptHeadcount:null;

  // Category totals
  var catTotals={};
  props.forEach(function(p){
    p.categories.forEach(function(c){ catTotals[c.cat]=(catTotals[c.cat]||0)+c.hrs; });
  });
  var catArr=Object.keys(catTotals).map(function(k){ return {cat:k,hrs:catTotals[k]}; })
    .filter(function(c){ return c.hrs>0; }).sort(function(a,b){ return b.hrs-a.hrs; });
  var maxCat=catArr.length?catArr[0].hrs:1;
  var totalCatHrs=catArr.reduce(function(s,c){ return s+c.hrs; },0);

  }

  // ── Build HTML ────────────────────────────────────────────────────────
  var html = renderTopbar()+
    '<div class="group-banner">'+
      '<div>'+
        '<h2 style="margin-top:8px;color:#F7F6F3;">YTD On-Site Training Tracker</h2>'+
        '<div class="gb-meta">Day-to-day &amp; on-site property training · 50-hour annual target per team member · '+props.length+' properties</div>'+

    // ── ALERTS ────────────────────────────────────────────────────────

        '<div><div style="font-size:13px;font-weight:700;color:#B5562B;margin-bottom:2px;">'+zeroProps.length+' propert'+(zeroProps.length===1?'y has':'ies have')+' logged zero hours this year</div>'+

        '<div style="font-size:16px;flex-shrink:0;">&#128200;</div>'+

    // ── GROUP KPIs ────────────────────────────────────────────────────

    // ── SUBMISSION COMPLIANCE ─────────────────────────────────────────
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;">'+

            (tzRed?ragPill('#B5562B',tzRed,'At Risk'):'')+
          '</div>'+
        '</div>'+

      '</div>'+
    '</div>'+

    // ── GROUP MONTHLY TREND ───────────────────────────────────────────
    (trendArr.length?
      '<div class="rpt-section">'+
        '<div class="rpt-section-title">Group Monthly Training Hours Trend</div>'+
        (bestMonth.hrs>0?
          '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;">'+
            '<div style="font-size:12px;color:var(--mist);">Peak month: <strong style="color:var(--cream);">'+bestMonth.month+' — '+Math.round(bestMonth.hrs).toLocaleString()+'h</strong></div>'+
